- type: function
  function:
    name: file_search
    description: >
      Search for files in the workspace by glob pattern. This only returns
      the paths of matching files. Use this tool when you know the exact filename
      pattern of the files you're searching for. Glob patterns match from the root
      of the workspace folder. Examples:

      - **/*.{js,ts} to match all js/ts files in the workspace.

      - src/** to match all files under the top-level src folder.

      - **/foo/**/*.js to match all js files under any foo folder in the workspace.


      In a multi-root workspace, you can scope the search to a specific workspace
      folder by using the absolute path to the folder as the query, e.g. /path/to/folder/**/*.ts.
    parameters:
      type: object
      properties:
        maxResults:
          type: number
          description: >
            The maximum number of results to return. Do not use this unless
            necessary, it can slow things down. By default, only some matches are
            returned. If you use this and don't see what you're looking for, you can
            try again with a more specific query or a larger maxResults.
        query:
          type: string
          description: >
            Search for files with names or paths matching this glob pattern.
            Can also be an absolute path to a workspace folder to scope the search
            in a multi-root workspace.
      required:
      - query
- type: function
  function:
    name: grep_search
    description: >
      Do a fast text search in the workspace. Use this tool when you want
      to search with an exact string or regex. If you are not sure what words will
      appear in the workspace, prefer using regex patterns with alternation (|) or
      character classes to search for multiple potential words at once instead of
      making separate searches. For example, use 'function|method|procedure' to
      look for all of those words at once. Use includePattern to search within files
      matching a specific pattern, or in a specific file, using a relative path. Use
      'includeIgnoredFiles' to include files normally ignored by .gitignore, other
      ignore files, and `files.exclude` and `search.exclude` settings. Warning: using
      this may cause the search to be slower, only set it when you want to search
      in ignored folders like node_modules or build outputs. Use this tool when you
      want to see an overview of a particular file, instead of using read_file many
      times to look for code within a file.


      In a multi-root workspace, you can scope the search to a specific workspace
      folder by using the absolute path to the folder as the includePattern, e.g.
      /path/to/folder.
    parameters:
      type: object
      properties:
        includeIgnoredFiles:
          type: boolean
          description: >
            Whether to include files that would normally be ignored according
            to .gitignore, other ignore files and `files.exclude` and `search.exclude`
            settings. Warning: using this may cause the search to be slower. Only
            set it when you want to search in ignored folders like node_modules or
            build outputs.
        includePattern:
          type: string
          description: >
            Search files matching this glob pattern. Will be applied to
            the relative path of files within the workspace. To search recursively
            inside a folder, use a proper glob pattern like "src/folder/**". Do not
            use | in includePattern. Can also be an absolute path to a workspace folder
            to scope the search in a multi-root workspace.
        isRegexp:
          type: boolean
          description: Whether the pattern is a regex.
        maxResults:
          type: number
          description: >
            The maximum number of results to return. Do not use this unless
            necessary, it can slow things down. By default, only some matches are
            returned. If you use this and don't see what you're looking for, you can
            try again with a more specific query or a larger maxResults.
        query:
          type: string
          description: >
            The pattern to search for in files in the workspace. Use regex
            with alternation (e.g., 'word1|word2|word3') or character classes to find
            multiple potential words in a single search. Be sure to set the isRegexp
            property properly to declare whether it's a regex or plain text pattern.
            Is case-insensitive.
      required:
      - query
      - isRegexp
- type: function
  function:
    name: list_dir
    description: >
      List the contents of a directory. Result will have the name of the child.
      If the name ends in /, it's a folder, otherwise a file
    parameters:
      type: object
      properties:
        path:
          type: string
          description: The absolute path to the directory to list.
      required:
      - path
- type: function
  function:
    name: memory
    description: >
      Manage a persistent memory system with three scopes for storing
      notes and information across conversations.


      Memory is organized under /memories/ with three tiers:

      - `/memories/` — User memory: persistent notes that survive across all workspaces
      and conversations. Store preferences, patterns, and general insights here.

      - `/memories/session/` — Session memory: notes scoped to the current conversation.
      Store task-specific context and in-progress notes here. Cleared after the conversation
      ends.

      - `/memories/repo/` — Repository memory: repository-scoped facts stored via
      Copilot. Only the `create` command is supported for this path.


      IMPORTANT: Before creating new memory files, first view the /memories/ directory
      to understand what already exists. This helps avoid duplicates and maintain
      organized notes.


      Commands:

      - `view`: View contents of a file or list directory contents. Can be used on
      files or directories (e.g., "/memories/" to see all top-level items).

      - `create`: Create a new file at the specified path with the given content.
      Fails if the file already exists.

      - `str_replace`: Replace an exact string in a file with a new string. The old_str
      must appear exactly once in the file.

      - `insert`: Insert text at a specific line number in a file. Line 0 inserts
      at the beginning.

      - `delete`: Delete a file or directory (and all its contents).

      - `rename`: Rename or move a file or directory from path to new_path. Cannot
      rename across scopes.
    parameters:
      type: object
      properties:
        command:
          type: string
          description: The operation to perform on the memory file system.
          enum:
          - view
          - create
          - str_replace
          - insert
          - delete
          - rename
        file_text:
          type: string
          description: Required for `create`. The content of the file to create.
        insert_line:
          type: number
          description: >
            Required for `insert`. The 0-based line number to insert text at.
            0 inserts before the first line.
        insert_text:
          type: string
          description: Required for `insert`. The text to insert at the specified line.
        new_path:
          type: string
          description: Required for `rename`. The new path for the file or directory.
        new_str:
          type: string
          description: Required for `str_replace`. The new string to replace old_str with.
        old_path:
          type: string
          description: Required for `rename`. The current path of the file or directory to rename.
        old_str:
          type: string
          description: Required for `str_replace`. The exact string in the file to replace. Must appear exactly once.
        path:
          type: string
          description: >
            The absolute path to the file or directory inside /memories/,
            e.g. "/memories/notes.md". Used by all commands except `rename`.
        view_range:
          type: array
          description: >
            Optional for `view`. A two-element array [start_line, end_line]
            (1-indexed) to view a specific range of lines.
          items:
            type: number
          maxItems: 2
          minItems: 2
      required:
      - command
- type: function
  function:
    name: read_file
    description: >
      Read the contents of a file.


      You must specify the line range you're interested in. Line numbers are 1-indexed.
      If the file contents returned are insufficient for your task, you may call this
      tool again to retrieve more content. Prefer reading larger ranges over doing
      many small reads. Binary files use startLine/endLine as byte offsets.
    parameters:
      type: object
      properties:
        endLine:
          type: number
          description: The inclusive line number to end reading at, 1-based.
        filePath:
          type: string
          description: The absolute path of the file to read.
        startLine:
          type: number
          description: The line number to start reading from, 1-based.
      required:
      - filePath
      - startLine
      - endLine
